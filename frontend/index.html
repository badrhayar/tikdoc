<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Viewport (viewport-fit=cover handles iPhone notch / Dynamic Island) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- SEO / sharing -->
    <meta name="description" content="Tabibo — Prenez rendez-vous avec votre médecin au Maroc" />

    <!-- PWA: manifest + Android status bar color -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F6E56" />

    <!-- iOS: Safari partially ignores the web manifest, so these are required -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tabibo" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Fonts (Inter + Plus Jakarta Sans for UI, Noto Sans Arabic for RTL) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Tabibo — Prenez rendez-vous avec un médecin</title>

    <!-- Early self-heal: runs even if the main bundle fails to load. If a stale
         service worker serves an outdated shell whose JS/CSS assets 404, clear
         the SW + caches and reload ONCE so the fresh deploy can load. -->
    <script>
      (function () {
        function heal(reason) {
          try {
            if (sessionStorage.getItem('tabibo_healed')) return;
            sessionStorage.setItem('tabibo_healed', '1');
            var reload = function () { try { location.reload(); } catch (e) {} };
            var jobs = [];
            if ('serviceWorker' in navigator) {
              jobs.push(navigator.serviceWorker.getRegistrations()
                .then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); })
                .catch(function () {}));
            }
            if (window.caches) {
              jobs.push(caches.keys()
                .then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); })
                .catch(function () {}));
            }
            Promise.all(jobs).then(reload, reload);
          } catch (e) {}
        }
        window.addEventListener('error', function (e) {
          var t = e && e.target; var url = t && (t.src || t.href);
          if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK') && url && url.indexOf('/assets/') !== -1) heal('asset:' + url);
        }, true);
        window.__tabiboHeal = heal;
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;color:#0F6E56;font-size:18px;font-weight:700;letter-spacing:-0.3px;">
        Tabibo…
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
